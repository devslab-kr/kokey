<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>kokey — vanilla example</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 560px; margin: 3rem auto; padding: 0 1rem; line-height: 1.6; }
    label { display: block; margin: 1.1rem 0 0.25rem; font-size: 0.9rem; color: #555; }
    input { font-size: 1.1rem; padding: 0.4rem 0.6rem; width: 18rem; }
    code { background: #f4f4f4; padding: 0.1rem 0.3rem; border-radius: 3px; }
  </style>
</head>
<body>
  <h1>kokey · vanilla</h1>
  <p>Type with the "wrong" keyboard — <code>observe()</code> fixes every <code>[data-kokey]</code>.</p>

  <label>Restore QWERTY · <code>data-kokey="en"</code> — try typing <code>ㅇㄴㅁ쇼</code> (or paste it)</label>
  <input data-kokey="en" placeholder="ㅇㄴㅁ쇼2068601 → dsaty2068601">

  <label>Compose Hangul from QWERTY · <code>data-kokey="ko"</code> — type <code>dkssud</code></label>
  <input data-kokey="ko" placeholder="dkssud → 안녕">

  <label>Russian from QWERTY · <code>data-kokey="ru"</code> — type <code>ghbdtn</code></label>
  <input data-kokey="ru" placeholder="ghbdtn → привет">

  <script type="module" src="/src/main.js"></script>
</body>
</html>
